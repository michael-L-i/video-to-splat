<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>video → splat</title>
<link rel="icon" href="data:," />
<script type="importmap">
{
  "imports": {
    "three": "/vendor/three/three.module.min.js",
    "three/addons/postprocessing/Pass.js": "/shims/pass.js",
    "@sparkjsdev/spark": "/vendor/spark/spark.module.min.js"
  }
}
</script>
<style>
  :root {
    --bg: #0a0b0c;
    --panel: #15171b;
    --panel-2: #1b1e23;
    --border: #24272d;
    --border-hi: #34383f;
    --text: #e8e9eb;
    --text-dim: #888e97;
    --text-faint: #4d525a;
    --accent: #e3a53d;
    --accent-soft: rgba(227, 165, 61, 0.12);
    --good: #5fb88a;
    --bad: #e0574a;
    --font-ui: system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
  }
  button, select, input { font: inherit; color: inherit; }

  /* ---------- topbar ---------- */
  .topbar {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .wordmark {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text);
  }
  .wordmark .arrow { color: var(--accent); margin: 0 2px; }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); flex: none; }
  .dot.active { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .dot.good { background: var(--good); }
  .dot.bad { background: var(--bad); }

  /* ---------- shell ---------- */
  .shell { display: flex; height: calc(100vh - 52px); }
  .sidebar {
    width: 340px;
    flex: none;
    border-right: 1px solid var(--border);
    background: var(--panel);
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .viewport { flex: 1; position: relative; background: var(--bg); }
  .viewport canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .viewport-hud {
    position: absolute;
    top: 14px;
    left: 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    pointer-events: none;
  }
  .viewport-hud .line { margin-bottom: 3px; text-shadow: 0 1px 3px rgba(0,0,0,.8); }
  .viewport-hud .line b { color: var(--text); font-weight: 600; }
  .frusta-toggle {
    position: absolute;
    top: 14px;
    right: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    background: rgba(10,11,12,.55);
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
  }

  /* ---------- generic panel bits ---------- */
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-faint);
    text-transform: uppercase;
  }
  h2.panel-title {
    font-family: var(--font-mono);
    font-size: 15px;
    letter-spacing: 0.02em;
    margin: 0;
    font-weight: 600;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  select {
    background: var(--panel-2);
    border: 1px solid var(--border-hi);
    border-radius: 3px;
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  select:focus-visible, button:focus-visible, .dropzone:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  .btn {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 3px;
    border: 1px solid var(--border-hi);
    background: var(--panel-2);
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: block;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--border-hi); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #14100a; font-weight: 600; }
  .btn-primary:hover { border-color: var(--accent); filter: brightness(1.08); }
  .btn-danger { color: var(--bad); }
  .btn-danger:hover { border-color: var(--bad); }
  .inline-msg { font-family: var(--font-mono); font-size: 11px; color: var(--bad); min-height: 14px; }

  /* ---------- dropzone ---------- */
  .dropzone {
    border: 1px dashed var(--border-hi);
    border-radius: 4px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    color: var(--text-dim);
    transition: border-color .15s, background .15s;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--accent-soft); }
  .dropzone .glyph { font-size: 20px; color: var(--accent); margin-bottom: 8px; }
  .dropzone .hint { font-size: 12px; }
  .dropzone .sub { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 6px; letter-spacing: 0.05em; }

  .video-preview { border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .video-preview video { width: 100%; display: block; background: #000; }
  .video-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); padding: 8px 2px 0; display: flex; justify-content: space-between; }
  .video-meta button { background: none; border: none; color: var(--text-faint); cursor: pointer; font-family: var(--font-mono); text-decoration: underline; padding: 0; }

  /* ---------- stage tracker ---------- */
  .stage-tracker { display: flex; flex-direction: column; gap: 12px; }
  .stage-row { display: flex; align-items: center; gap: 10px; }
  .stage-row .dot { width: 9px; height: 9px; border: 1px solid var(--border-hi); background: transparent; }
  .stage-row.done .dot { background: var(--good); border-color: var(--good); }
  .stage-row.active .dot { background: var(--accent); border-color: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .stage-row.active .dot { animation: none; } }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 var(--accent-soft); } 50% { box-shadow: 0 0 0 5px var(--accent-soft); } }
  .stage-row .label {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-faint);
    flex: 1;
  }
  .stage-row.active .label, .stage-row.done .label { color: var(--text); }
  .stage-row .detail { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }

  .progress-track { height: 4px; border-radius: 2px; background: var(--panel-2); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .4s ease; }
  .status-msg { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-dim); line-height: 1.5; word-break: break-word; }

  .filmstrip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .filmstrip::-webkit-scrollbar { height: 5px; }
  .filmstrip::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
  .filmstrip img {
    width: 62px;
    height: 44px;
    object-fit: cover;
    border-radius: 2px;
    border: 1px solid var(--border);
    flex: none;
  }

  .hr { border: none; border-top: 1px solid var(--border); margin: 0; }

  /* ---------- artifacts ---------- */
  .artifact-list { display: flex; flex-direction: column; gap: 8px; }
  .artifact {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 3px;
  }
  .artifact .name { font-family: var(--font-mono); font-size: 12px; }
  .artifact .size { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); }
  .artifact a.btn { padding: 6px 10px; font-size: 10px; }

  .center-note { color: var(--text-dim); font-size: 13px; line-height: 1.6; }
  .checkbox-row { display: flex; align-items: center; gap: 6px; }
  .checkbox-row input { accent-color: var(--accent); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="wordmark">VIDEO<span class="arrow">→</span>SPLAT</div>
    <div class="status-pill"><span class="dot" id="statusDot"></span><span id="statusText">IDLE</span></div>
  </header>

  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="viewport" id="viewport">
      <canvas id="canvas"></canvas>
      <div class="viewport-hud" id="viewportHud"></div>
      <label class="frusta-toggle" id="frustaToggle" hidden>
        <input type="checkbox" id="frustaCheckbox" checked />
        camera frusta
      </label>
    </main>
  </div>

  <input type="file" id="fileInput" accept="video/*" hidden />
  <script type="module" src="/app.js"></script>
</body>
</html>
